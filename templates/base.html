<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" sizes="180x180" href="/icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여행 가이드</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #fdfbf7;
            color: #2d3748;
        }

        /* --- Custom Scrollbar --- */
        .custom-scroll::-webkit-scrollbar { height: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #edf2f7; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 4px; }

        /* --- PDF 인쇄용(Print) CSS (spain8.html 설정 유지) --- */
        @media print {
            body {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                background-color: white !important;
            }
            nav, footer, button, .outlink { display: none !important; }
            .shadow-lg, .shadow-sm, .shadow { box-shadow: none !important; border: 1px solid #cbd5e1 !important; }
            section, .bg-white, .rounded-xl, .flex { page-break-inside: avoid; break-inside: avoid; }
            .custom-scroll { overflow: visible !important; flex-wrap: wrap; }
            main { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body class="antialiased relative">

    <nav class="sticky top-0 z-40 bg-white/95 backdrop-blur shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">

                <div class="flex items-center gap-3 sm:gap-8 flex-1">
                    <a href="/" class="flex items-center hover:opacity-80 transition-opacity whitespace-nowrap mr-1 sm:mr-0">
                        <span class="text-2xl font-bold text-orange-700">✈️<span class="hidden sm:inline ml-1">여행 가이드</span></span>
                    </a>

                    <div class="flex items-center gap-5 sm:gap-6">
                        <a href="/" class="text-gray-600 hover:text-orange-600 font-bold transition-colors flex items-center gap-1" title="스페인 일정">
                            <span id="ui_nav_emoji" class="text-2xl sm:text-base">🇪🇸</span>
                            <span id="ui_nav_title" class="hidden sm:inline">스페인 일정</span>
                        </a>
                        <a href="/audio" class="text-gray-600 hover:text-blue-600 font-bold transition-colors flex items-center gap-1" title="오디오 가이드">
                            <span class="text-2xl sm:text-base">🎧</span>
                            <span class="hidden sm:inline">오디오 가이드</span>
                        </a>
                        <a href="/expenses" class="text-gray-600 hover:text-green-600 font-bold transition-colors flex items-center gap-1" title="가계부">
                            <span class="text-2xl sm:text-base">💰</span>
                            <span class="hidden sm:inline">가계부</span>
                        </a>
                    </div>
                </div>

                <div class="flex items-center ml-2 shrink-0">
                    {% if current_user.is_authenticated %}
                        <a href="/admin/dashboard" class="text-gray-400 hover:text-orange-600 transition-colors flex items-center gap-1" title="관리자 모드">
                            <span class="text-2xl sm:text-base">⚙️</span>
                            <span class="hidden sm:inline font-extrabold text-orange-600">관리자</span>
                        </a>
                        <span class="text-gray-300 mx-2 hidden sm:inline">|</span>
                        <a href="/admin/logout" class="text-gray-500 hover:text-red-500 font-medium text-sm hidden sm:inline" title="로그아웃">로그아웃</a>
                    {% else %}
                        <a href="/admin/login" class="text-gray-400 hover:text-blue-500 font-medium text-sm">Login</a>
                    {% endif %}
                </div>

            </div>
        </div>
    </nav>

    <div class="pb-20">
        {% block content %}{% endblock %}
    </div>

    <div id="pwa-install-prompt" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 w-[90%] max-w-md z-[1050] hidden">
        <div class="bg-white border-2 border-orange-200 rounded-2xl shadow-2xl p-4 flex items-center justify-between transition-all transform translate-y-0">
            <div class="flex-1 pr-4">
                <strong class="text-orange-900 font-extrabold text-base block mb-1">📱 홈 화면에 추가하기</strong>
                <span class="text-sm text-gray-600 leading-tight block">앱처럼 설치해서 현지에서 편하게 확인하세요!</span>
            </div>
            <div class="flex flex-col sm:flex-row gap-2 shrink-0">
                <button id="pwa-install-btn" class="bg-orange-600 hover:bg-orange-700 text-white font-bold py-2 px-4 rounded-xl text-sm transition-colors shadow-sm">설치</button>
                <button id="pwa-close-btn" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2 px-4 rounded-xl text-sm transition-colors">닫기</button>
            </div>
        </div>
    </div>

    <script>
        // PWA 서비스 워커 및 팝업 로직
        let deferredPrompt;
        const installPrompt = document.getElementById('pwa-install-prompt');
        const installBtn = document.getElementById('pwa-install-btn');
        const closeBtn = document.getElementById('pwa-close-btn');

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(() => console.log('ServiceWorker 등록 성공'))
                    .catch(err => console.log('ServiceWorker 등록 실패:', err));
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installPrompt.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            installPrompt.classList.add('hidden');
            if (deferredPrompt) {
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                deferredPrompt = null;
            }
        });

        closeBtn.addEventListener('click', () => {
            installPrompt.classList.add('hidden');
        });
    </script>

    {% block scripts %}{% endblock %}

</body>
</html>
